name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            pride-index/package-lock.json
            pride-index-astro/package-lock.json

      # The Astro build's prebuild step runs the pride-index ingest pipeline
      # (regenerates + validates the data from the workbook), so the data app's
      # deps must be installed too — this is what keeps the deployed site's
      # "recomputed from evidence at build time" guarantee true in CI.
      - name: Install data-pipeline dependencies
        working-directory: pride-index
        run: npm ci

      - name: Install site dependencies
        working-directory: pride-index-astro
        run: npm ci

      - name: Ingest + validate workbook, then build the Astro static site
        working-directory: pride-index-astro
        env:
          BASE_PATH: /corporate-pride-index/
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: pride-index-astro/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
